<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <defs>
    <!-- Desert gradient background -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e2a"/>
      <stop offset="40%" stop-color="#1a1040"/>
      <stop offset="70%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#c2956b"/>
    </linearGradient>
    <linearGradient id="sandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a86a"/>
      <stop offset="100%" stop-color="#b8884a"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00aa55"/>
    </linearGradient>
    <linearGradient id="camelBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c49a6c"/>
      <stop offset="100%" stop-color="#a07848"/>
    </linearGradient>
    <linearGradient id="hologramGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#00aaff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8844ff" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00aaff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00aaff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <!-- Star twinkle animation -->
    <style>
      @keyframes twinkle { 0%,100%{opacity:0.3} 50%{opacity:1} }
      @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
      @keyframes dataFlow { 0%{stroke-dashoffset:20} 100%{stroke-dashoffset:0} }
      @keyframes brainPulse { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:0.9;transform:scale(1.05)} }
      @keyframes type { 0%,100%{opacity:0} 50%{opacity:1} }
      .star { animation: twinkle 3s ease-in-out infinite; }
      .screen-pulse { animation: pulse 2s ease-in-out infinite; }
      .float-anim { animation: float 4s ease-in-out infinite; }
      .data-line { stroke-dasharray: 4 4; animation: dataFlow 1s linear infinite; }
      .brain-glow { animation: brainPulse 3s ease-in-out infinite; transform-origin: center; }
      .cursor-blink { animation: type 1s step-end infinite; }
    </style>
  </defs>

  <!-- Sky background -->
  <rect width="900" height="700" fill="url(#skyGrad)"/>

  <!-- Stars -->
  <circle cx="80" cy="50" r="1.5" fill="#fff" class="star"/>
  <circle cx="200" cy="80" r="1" fill="#fff" class="star" style="animation-delay:0.5s"/>
  <circle cx="350" cy="30" r="1.8" fill="#fff" class="star" style="animation-delay:1s"/>
  <circle cx="500" cy="60" r="1.2" fill="#fff" class="star" style="animation-delay:1.5s"/>
  <circle cx="650" cy="40" r="1.5" fill="#fff" class="star" style="animation-delay:0.3s"/>
  <circle cx="780" cy="90" r="1" fill="#fff" class="star" style="animation-delay:2s"/>
  <circle cx="130" cy="130" r="1.3" fill="#fff" class="star" style="animation-delay:0.8s"/>
  <circle cx="420" cy="100" r="0.8" fill="#fff" class="star" style="animation-delay:1.2s"/>
  <circle cx="720" cy="25" r="1.6" fill="#fff" class="star" style="animation-delay:0.7s"/>
  <circle cx="850" cy="55" r="1.1" fill="#fff" class="star" style="animation-delay:1.8s"/>
  <circle cx="50" cy="180" r="0.9" fill="#fff" class="star" style="animation-delay:2.2s"/>
  <circle cx="300" cy="150" r="1.4" fill="#fff" class="star" style="animation-delay:0.4s"/>

  <!-- Crescent moon -->
  <circle cx="760" cy="120" r="35" fill="#ffe566"/>
  <circle cx="775" cy="110" r="30" fill="#0a0e2a"/>

  <!-- Desert sand dunes -->
  <ellipse cx="450" cy="620" rx="550" ry="120" fill="url(#sandGrad)"/>
  <ellipse cx="150" cy="640" rx="250" ry="90" fill="#c8a060"/>
  <ellipse cx="750" cy="650" rx="280" ry="80" fill="#c8a060"/>
  <rect x="0" y="620" width="900" height="80" fill="#b8884a"/>

  <!-- === CAMEL === -->
  <g transform="translate(280, 240)">
    <!-- Camel legs (back) -->
    <rect x="30" y="250" width="28" height="120" rx="10" fill="#8a6838"/>
    <rect x="180" y="255" width="28" height="115" rx="10" fill="#8a6838"/>
    <!-- Camel legs (front) -->
    <rect x="55" y="250" width="30" height="125" rx="10" fill="#a07848"/>
    <rect x="200" y="250" width="30" height="120" rx="10" fill="#a07848"/>
    <!-- Hooves -->
    <ellipse cx="70" cy="375" rx="18" ry="8" fill="#5a4020"/>
    <ellipse cx="215" cy="370" rx="18" ry="8" fill="#5a4020"/>
    <ellipse cx="44" cy="370" rx="16" ry="7" fill="#5a4020"/>
    <ellipse cx="194" cy="370" rx="16" ry="7" fill="#5a4020"/>

    <!-- Camel body -->
    <ellipse cx="135" cy="230" rx="120" ry="60" fill="url(#camelBody)"/>
    <!-- Hump -->
    <ellipse cx="120" cy="178" rx="50" ry="40" fill="#b8884a"/>
    <ellipse cx="125" cy="175" rx="45" ry="36" fill="#c49a6c"/>

    <!-- Saudi saddle blanket (green with gold trim) -->
    <path d="M70 190 Q120 165 180 190 L185 230 Q120 215 65 230 Z" fill="#006c35" stroke="#ffd700" stroke-width="2"/>
    <path d="M80 200 Q120 185 170 200" stroke="#ffd700" stroke-width="1.5" fill="none"/>
    <path d="M75 210 Q120 195 175 210" stroke="#ffd700" stroke-width="1.5" fill="none"/>
    <!-- Gold tassels -->
    <line x1="72" y1="225" x2="68" y2="240" stroke="#ffd700" stroke-width="2"/>
    <circle cx="68" cy="242" r="3" fill="#ffd700"/>
    <line x1="182" y1="225" x2="186" y2="240" stroke="#ffd700" stroke-width="2"/>
    <circle cx="186" cy="242" r="3" fill="#ffd700"/>

    <!-- Neck -->
    <path d="M200 230 Q230 180 250 120 Q255 100 245 85 L220 90 Q215 110 210 130 Q195 180 185 220" fill="url(#camelBody)" stroke="none"/>

    <!-- Head -->
    <ellipse cx="255" cy="75" rx="40" ry="28" fill="#c49a6c" transform="rotate(-15, 255, 75)"/>
    <!-- Snout -->
    <ellipse cx="288" cy="80" rx="22" ry="16" fill="#b8884a" transform="rotate(-10, 288, 80)"/>
    <!-- Nostril -->
    <ellipse cx="302" cy="78" rx="4" ry="3" fill="#7a5830"/>
    <!-- Mouth - slight smile -->
    <path d="M290 90 Q298 96 306 92" stroke="#7a5830" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Eye -->
    <ellipse cx="268" cy="65" rx="7" ry="8" fill="#fff"/>
    <circle cx="270" cy="65" r="5" fill="#2a1a0a"/>
    <circle cx="272" cy="63" r="2" fill="#fff"/>
    <!-- Eyelashes -->
    <line x1="264" y1="57" x2="261" y2="53" stroke="#5a3a1a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="268" y1="56" x2="267" y2="51" stroke="#5a3a1a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="273" y1="57" x2="274" y2="52" stroke="#5a3a1a" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Ear -->
    <ellipse cx="245" cy="50" rx="8" ry="14" fill="#b8884a" transform="rotate(-20, 245, 50)"/>
    <ellipse cx="245" cy="52" rx="4" ry="9" fill="#d4a070" transform="rotate(-20, 245, 50)"/>

    <!-- Saudi shamagh / headpiece on camel -->
    <path d="M230 45 Q250 25 275 40 L280 55 Q260 38 238 52 Z" fill="#fff"/>
    <path d="M235 48 Q250 33 270 43" stroke="#cc0000" stroke-width="1" fill="none"/>
    <path d="M237 53 Q252 38 268 48" stroke="#cc0000" stroke-width="1" fill="none"/>
    <!-- Agal (black cord) -->
    <path d="M232 48 Q250 30 274 43" stroke="#1a1a1a" stroke-width="3" fill="none"/>

    <!-- === FRONT LEG HOLDING WRENCH (building) === -->
    <g transform="translate(195, 240)">
      <!-- Arm/leg reaching forward -->
      <path d="M20 10 Q50 -20 70 -40" stroke="#a07848" stroke-width="22" fill="none" stroke-linecap="round"/>
      <!-- Hoof/hand -->
      <circle cx="70" cy="-40" r="12" fill="#a07848"/>
      <!-- Wrench -->
      <g transform="translate(70, -45) rotate(30)">
        <rect x="-4" y="-30" width="8" height="35" rx="3" fill="#888"/>
        <path d="M-10 -35 Q-4 -42 0 -35 Q4 -42 10 -35 L8 -25 L-8 -25 Z" fill="#aaa"/>
        <rect x="-3" y="-28" width="6" height="8" rx="1" fill="#666"/>
      </g>
    </g>
  </g>

  <!-- === AGI MACHINE / COMPUTER SYSTEM === -->
  <g transform="translate(560, 200)">
    <!-- Main server rack -->
    <rect x="0" y="100" width="180" height="260" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="2"/>
    <rect x="5" y="105" width="170" height="250" rx="6" fill="#0d0d1a"/>

    <!-- Server lights -->
    <circle cx="25" cy="125" r="4" fill="#00ff88" class="screen-pulse"/>
    <circle cx="25" cy="145" r="4" fill="#00ff88" class="screen-pulse" style="animation-delay:0.3s"/>
    <circle cx="25" cy="165" r="4" fill="#ff4444" class="screen-pulse" style="animation-delay:0.6s"/>
    <circle cx="25" cy="185" r="4" fill="#00ff88" class="screen-pulse" style="animation-delay:0.9s"/>
    <circle cx="25" cy="205" r="4" fill="#ffaa00" class="screen-pulse" style="animation-delay:1.2s"/>
    <circle cx="25" cy="225" r="4" fill="#00ff88" class="screen-pulse" style="animation-delay:0.2s"/>
    <circle cx="25" cy="245" r="4" fill="#00ff88" class="screen-pulse" style="animation-delay:0.7s"/>

    <!-- Rack horizontal lines -->
    <line x1="15" y1="135" x2="165" y2="135" stroke="#222" stroke-width="1"/>
    <line x1="15" y1="155" x2="165" y2="155" stroke="#222" stroke-width="1"/>
    <line x1="15" y1="175" x2="165" y2="175" stroke="#222" stroke-width="1"/>
    <line x1="15" y1="195" x2="165" y2="195" stroke="#222" stroke-width="1"/>
    <line x1="15" y1="215" x2="165" y2="215" stroke="#222" stroke-width="1"/>
    <line x1="15" y1="235" x2="165" y2="235" stroke="#222" stroke-width="1"/>
    <line x1="15" y1="255" x2="165" y2="255" stroke="#222" stroke-width="1"/>

    <!-- Ventilation pattern -->
    <g opacity="0.3">
      <rect x="45" y="118" width="110" height="12" rx="2" fill="none" stroke="#444" stroke-width="0.5"/>
      <line x1="50" y1="120" x2="50" y2="128" stroke="#444" stroke-width="0.5"/>
      <line x1="58" y1="120" x2="58" y2="128" stroke="#444" stroke-width="0.5"/>
      <line x1="66" y1="120" x2="66" y2="128" stroke="#444" stroke-width="0.5"/>
      <line x1="74" y1="120" x2="74" y2="128" stroke="#444" stroke-width="0.5"/>
      <line x1="82" y1="120" x2="82" y2="128" stroke="#444" stroke-width="0.5"/>
    </g>

    <!-- Progress bars on rack -->
    <rect x="45" y="140" width="110" height="8" rx="3" fill="#111"/>
    <rect x="45" y="140" width="88" height="8" rx="3" fill="#00ff88" opacity="0.8"/>
    <rect x="45" y="160" width="110" height="8" rx="3" fill="#111"/>
    <rect x="45" y="160" width="55" height="8" rx="3" fill="#00aaff" opacity="0.8"/>
    <rect x="45" y="180" width="110" height="8" rx="3" fill="#111"/>
    <rect x="45" y="180" width="100" height="8" rx="3" fill="#ffaa00" opacity="0.8"/>

    <!-- Text labels -->
    <text x="45" y="210" fill="#00ff88" font-family="monospace" font-size="9" opacity="0.8">GPU CLUSTER: ACTIVE</text>
    <text x="45" y="225" fill="#00aaff" font-family="monospace" font-size="9" opacity="0.8">NEURAL NET: TRAINING</text>
    <text x="45" y="240" fill="#ffaa00" font-family="monospace" font-size="9" opacity="0.8">AGI PROGRESS: 73.2%</text>
    <text x="45" y="255" fill="#ff6666" font-family="monospace" font-size="8" opacity="0.6">TEMP: 42°C (DESERT MODE)</text>

    <!-- Monitor on top -->
    <rect x="15" y="20" width="150" height="75" rx="5" fill="#111" stroke="#333" stroke-width="2"/>
    <rect x="20" y="25" width="140" height="65" rx="3" fill="#0a1a0a"/>

    <!-- Screen content - brain visualization -->
    <g class="brain-glow">
      <ellipse cx="90" cy="50" rx="30" ry="22" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>
      <path d="M70 42 Q80 35 90 42 Q100 35 110 42" stroke="#00ffcc" stroke-width="1" fill="none" opacity="0.8"/>
      <path d="M72 52 Q82 58 90 52 Q98 58 108 52" stroke="#00ffcc" stroke-width="1" fill="none" opacity="0.8"/>
      <line x1="90" y1="30" x2="90" y2="70" stroke="#00ff88" stroke-width="0.5" opacity="0.4"/>
      <line x1="65" y1="50" x2="115" y2="50" stroke="#00ff88" stroke-width="0.5" opacity="0.4"/>
      <!-- Neural connection dots -->
      <circle cx="75" cy="42" r="2" fill="#00ff88"/>
      <circle cx="90" cy="35" r="2" fill="#00ffcc"/>
      <circle cx="105" cy="42" r="2" fill="#00ff88"/>
      <circle cx="78" cy="55" r="2" fill="#00ffcc"/>
      <circle cx="102" cy="55" r="2" fill="#00ffcc"/>
      <circle cx="90" cy="60" r="2" fill="#00ff88"/>
    </g>
    <!-- Cursor blink -->
    <rect x="125" y="75" width="8" height="10" fill="#00ff88" class="cursor-blink"/>

    <!-- Monitor stand -->
    <rect x="78" y="95" width="24" height="8" fill="#333"/>
    <rect x="68" y="100" width="44" height="5" rx="2" fill="#444"/>
  </g>

  <!-- === HOLOGRAPHIC AGI BRAIN floating above === -->
  <g transform="translate(650, 120)" class="float-anim">
    <ellipse cx="0" cy="0" rx="50" ry="50" fill="url(#glowBlue)" filter="url(#softGlow)"/>
    <!-- Holographic brain outline -->
    <g opacity="0.9" filter="url(#glow)">
      <path d="M-18 -5 Q-20 -20 -10 -25 Q0 -30 10 -25 Q20 -20 18 -5 Q22 5 15 15 Q5 22 -5 22 Q-15 18 -18 10 Q-22 5 -18 -5Z" fill="none" stroke="#00ffcc" stroke-width="1.5"/>
      <path d="M0 -28 L0 20" stroke="#00ffcc" stroke-width="0.5" opacity="0.5"/>
      <path d="M-20 -5 Q-5 -15 0 -5 Q5 -15 20 -5" stroke="#00aaff" stroke-width="1" fill="none"/>
      <path d="M-18 5 Q-5 12 0 5 Q5 12 18 5" stroke="#00aaff" stroke-width="1" fill="none"/>
      <!-- Synapses -->
      <circle cx="-10" cy="-15" r="2.5" fill="#00ffcc" opacity="0.9"/>
      <circle cx="10" cy="-15" r="2.5" fill="#00ffcc" opacity="0.9"/>
      <circle cx="0" cy="-5" r="3" fill="#00ff88"/>
      <circle cx="-12" cy="8" r="2" fill="#00aaff" opacity="0.8"/>
      <circle cx="12" cy="8" r="2" fill="#00aaff" opacity="0.8"/>
    </g>
    <!-- "AGI" text -->
    <text x="0" y="42" fill="#00ffcc" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle" filter="url(#glow)">A G I</text>
  </g>

  <!-- Data flow lines from camel wrench to machine -->
  <g filter="url(#glow)">
    <path d="M540 230 Q560 220 570 240" stroke="#00ff88" stroke-width="1.5" fill="none" class="data-line"/>
    <path d="M535 250 Q555 240 565 260" stroke="#00aaff" stroke-width="1.5" fill="none" class="data-line" style="animation-delay:0.3s"/>
    <path d="M538 270 Q558 260 568 280" stroke="#00ffcc" stroke-width="1.5" fill="none" class="data-line" style="animation-delay:0.6s"/>
  </g>

  <!-- Scattered circuit elements on the ground -->
  <g transform="translate(470, 560)" opacity="0.7">
    <!-- PCB board -->
    <rect x="0" y="0" width="40" height="30" rx="3" fill="#0a5c0a" stroke="#1a8c1a" stroke-width="1"/>
    <line x1="5" y1="8" x2="35" y2="8" stroke="#1a8c1a" stroke-width="0.5"/>
    <line x1="5" y1="16" x2="25" y2="16" stroke="#1a8c1a" stroke-width="0.5"/>
    <line x1="15" y1="5" x2="15" y2="25" stroke="#1a8c1a" stroke-width="0.5"/>
    <rect x="8" y="10" width="6" height="4" fill="#222"/>
    <rect x="22" y="18" width="8" height="5" fill="#222"/>
    <circle cx="30" cy="10" r="2" fill="#ff0" opacity="0.5"/>
  </g>

  <!-- Scattered chips -->
  <g transform="translate(380, 580)" opacity="0.5">
    <rect x="0" y="0" width="20" height="20" rx="2" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
    <circle cx="10" cy="10" r="3" fill="#333"/>
    <line x1="-4" y1="5" x2="0" y2="5" stroke="#888" stroke-width="1"/>
    <line x1="-4" y1="10" x2="0" y2="10" stroke="#888" stroke-width="1"/>
    <line x1="-4" y1="15" x2="0" y2="15" stroke="#888" stroke-width="1"/>
    <line x1="20" y1="5" x2="24" y2="5" stroke="#888" stroke-width="1"/>
    <line x1="20" y1="10" x2="24" y2="10" stroke="#888" stroke-width="1"/>
    <line x1="20" y1="15" x2="24" y2="15" stroke="#888" stroke-width="1"/>
  </g>

  <!-- Coffee cup (Arabian coffee) near camel -->
  <g transform="translate(340, 575)">
    <path d="M0 0 L5 20 L25 20 L30 0 Z" fill="#8b6914" stroke="#6b4f10" stroke-width="1"/>
    <ellipse cx="15" cy="0" rx="16" ry="5" fill="#a07818"/>
    <ellipse cx="15" cy="0" rx="12" ry="3.5" fill="#3a2000"/>
    <!-- Steam -->
    <path d="M10 -8 Q8 -16 12 -22" stroke="#fff" stroke-width="1" fill="none" opacity="0.3"/>
    <path d="M18 -6 Q20 -14 16 -20" stroke="#fff" stroke-width="1" fill="none" opacity="0.25"/>
  </g>

  <!-- Title text -->
  <text x="450" y="680" fill="#ffd700" font-family="Georgia, serif" font-size="22" font-weight="bold" text-anchor="middle" letter-spacing="2">
    🐪 Building AGI in the Desert 🏜️
  </text>

  <!-- Saudi flag colors accent bar -->
  <rect x="0" y="695" width="900" height="5" fill="#006c35"/>
</svg>