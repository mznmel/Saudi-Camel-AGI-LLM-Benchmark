      <stop offset="30%" stop-color="#95fff3"/>
      <stop offset="65%" stop-color="#38d9dd"/>
      <stop offset="100%" stop-color="#0f6f93"/>
    </radialGradient>
    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

