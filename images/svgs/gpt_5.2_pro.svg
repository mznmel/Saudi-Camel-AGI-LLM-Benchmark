<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="t d">
  <title id="t">Saudi camel building an artificial general intelligence system</title>
  <desc id="d">A friendly camel wearing a ghutra and agal works at a bench with a monitor labeled AGI, circuit boards, and glowing cables in a desert scene.</desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe8ff"/>
      <stop offset="1" stop-color="#f6fbff"/>
    </linearGradient>

    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3d39b"/>
      <stop offset="1" stop-color="#e7b870"/>
    </linearGradient>

    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1c2a" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#123b5a" stop-opacity="0.95"/>
    </linearGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="pcbDots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2" fill="#1ee6a8" opacity="0.55"/>
      <circle cx="13" cy="10" r="1.6" fill="#71f3ff" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#sky)"/>
  <path d="M0,460 C220,410 420,520 640,470 C860,420 980,520 1200,470 L1200,675 L0,675 Z" fill="url(#sand)"/>
  <path d="M120,520 C220,500 280,560 360,540 C420,528 470,560 540,545" fill="none" stroke="#d7a55e" stroke-width="14" opacity="0.35" stroke-linecap="round"/>
  <path d="M860,520 C960,500 1020,560 1100,540" fill="none" stroke="#d7a55e" stroke-width="14" opacity="0.35" stroke-linecap="round"/>

  <!-- Distant dunes -->
  <path d="M0,430 C180,380 340,470 520,420 C700,370 880,470 1200,410 L1200,470 L0,470 Z" fill="#f0cc8c" opacity="0.7"/>
  <path d="M0,455 C240,430 360,500 560,470 C760,440 900,520 1200,455 L1200,500 L0,500 Z" fill="#e9bf79" opacity="0.65"/>

  <!-- Bench and AGI rig -->
  <g filter="url(#shadow)">
    <!-- Table -->
    <rect x="640" y="415" width="430" height="28" rx="12" fill="#7a4b2a"/>
    <rect x="670" y="440" width="22" height="150" rx="10" fill="#6b3f22"/>
    <rect x="1018" y="440" width="22" height="150" rx="10" fill="#6b3f22"/>
    <rect x="735" y="468" width="240" height="120" rx="16" fill="#2a2f39"/>
    <rect x="753" y="486" width="204" height="84" rx="12" fill="#1e2430"/>
    <path d="M753,538 H957" stroke="#404a5c" stroke-width="2" opacity="0.55"/>
    <circle cx="775" cy="560" r="6" fill="#ffcc66"/>
    <circle cx="800" cy="560" r="6" fill="#6cff8a"/>
    <circle cx="825" cy="560" r="6" fill="#67b8ff"/>

    <!-- Monitor -->
    <rect x="700" y="255" width="340" height="190" rx="18" fill="#1b2230"/>
    <rect x="718" y="272" width="304" height="154" rx="14" fill="url(#glass)"/>
    <rect x="830" y="445" width="80" height="18" rx="9" fill="#2b3447"/>
    <rect x="805" y="463" width="130" height="18" rx="9" fill="#2b3447"/>

    <!-- Screen content -->
    <g>
      <text x="870" y="332" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial" font-size="56" fill="#71f3ff" filter="url(#glow)">AGI</text>
      <text x="870" y="365" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial" font-size="16" fill="#b7f7ff" opacity="0.85">cognition core</text>

      <!-- Circuit traces -->
      <path d="M760,310 H820 V292 H900 V310 H980" fill="none" stroke="#1ee6a8" stroke-width="3" opacity="0.75"/>
      <path d="M760,390 H830 V410 H910 V390 H980" fill="none" stroke="#71f3ff" stroke-width="3" opacity="0.6"/>
      <circle cx="820" cy="310" r="6" fill="#1ee6a8"/>
      <circle cx="900" cy="310" r="6" fill="#1ee6a8"/>
      <circle cx="830" cy="390" r="6" fill="#71f3ff"/>
      <circle cx="910" cy="390" r="6" fill="#71f3ff"/>

      <!-- Tiny blocks -->
      <rect x="760" y="338" width="62" height="20" rx="8" fill="#20364b" opacity="0.95"/>
      <rect x="828" y="338" width="82" height="20" rx="8" fill="#20364b" opacity="0.95"/>
      <rect x="916" y="338" width="64" height="20" rx="8" fill="#20364b" opacity="0.95"/>
      <text x="791" y="352" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" fill="#c9f8ff" opacity="0.9">plan()</text>
      <text x="869" y="352" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" fill="#c9f8ff" opacity="0.9">learn()</text>
      <text x="948" y="352" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" fill="#c9f8ff" opacity="0.9">reflect()</text>
    </g>

    <!-- PCB sheet -->
    <g>
      <path d="M680,455 L825,430 L860,520 L715,545 Z" fill="#0f2a24" opacity="0.95"/>
      <path d="M680,455 L825,430 L860,520 L715,545 Z" fill="url(#pcbDots)" opacity="0.9"/>
      <path d="M705,480 C750,455 790,468 830,450" fill="none" stroke="#71f3ff" stroke-width="2" opacity="0.65"/>
      <circle cx="740" cy="468" r="5" fill="#71f3ff" opacity="0.8"/>
      <circle cx="790" cy="468" r="5" fill="#1ee6a8" opacity="0.8"/>
      <circle cx="825" cy="455" r="5" fill="#71f3ff" opacity="0.8"/>
    </g>

    <!-- Power core box -->
    <g>
      <rect x="1000" y="470" width="110" height="110" rx="18" fill="#1c232f"/>
      <rect x="1014" y="486" width="82" height="36" rx="12" fill="#0f1a24"/>
      <text x="1055" y="510" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial" font-size="14" fill="#b7f7ff" opacity="0.9">KSA LAB</text>
      <rect x="1014" y="532" width="82" height="34" rx="12" fill="#0f1a24"/>
      <path d="M1028,550 H1082" stroke="#1ee6a8" stroke-width="3" opacity="0.85" filter="url(#glow)"/>
      <circle cx="1094" cy="551" r="7" fill="#2cff7a" filter="url(#glow)"/>
    </g>

    <!-- Cables -->
    <path d="M980,560 C930,600 860,595 820,565" fill="none" stroke="#71f3ff" stroke-width="6" opacity="0.7" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M1005,560 C955,640 845,640 760,590" fill="none" stroke="#1ee6a8" stroke-width="6" opacity="0.55" stroke-linecap="round" filter="url(#glow)"/>
  </g>

  <!-- Camel -->
  <g transform="translate(120,70)" filter="url(#shadow)">
    <!-- Shadow on sand -->
    <ellipse cx="430" cy="540" rx="250" ry="45" fill="#000" opacity="0.15"/>

    <!-- Body -->
    <ellipse cx="380" cy="410" rx="230" ry="135" fill="#c89b63"/>
    <ellipse cx="380" cy="430" rx="210" ry="115" fill="#d3aa73" opacity="0.9"/>

    <!-- Hump -->
    <path d="M380,280 C320,270 270,320 285,370 C305,440 400,420 455,395 C515,366 520,300 470,285 C435,274 410,286 380,280 Z"
          fill="#c28f57"/>
    <path d="M380,298 C332,292 292,330 304,368 C320,420 398,405 446,382 C500,356 505,308 464,298 C438,291 410,300 380,298 Z"
          fill="#d0a46e" opacity="0.75"/>

    <!-- Neck -->
    <path d="M540,330 C600,310 650,330 670,370 C690,410 675,450 640,475 C608,497 574,494 545,470 C522,451 520,420 535,390 C548,364 530,350 540,330 Z"
          fill="#c89b63"/>

    <!-- Head -->
    <g transform="translate(615,320)">
      <path d="M70,70 C95,45 130,40 160,58 C190,76 198,112 184,140 C168,172 130,185 98,170 C68,156 52,118 60,92 C63,81 62,78 70,70 Z"
            fill="#c89b63"/>
      <path d="M92,92 C112,78 138,78 154,92" fill="none" stroke="#9a6a3e" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
      <circle cx="125" cy="112" r="8" fill="#2a2a2a"/>
      <circle cx="122" cy="109" r="3" fill="#fff" opacity="0.8"/>

      <!-- Snout -->
      <path d="M150,138 C168,132 184,138 192,150 C202,166 192,184 174,190 C152,198 132,188 128,170 C126,158 135,145 150,138 Z"
            fill="#b78452"/>
      <circle cx="175" cy="165" r="4" fill="#2a2a2a" opacity="0.85"/>
      <circle cx="163" cy="170" r="4" fill="#2a2a2a" opacity="0.85"/>

      <!-- Ear -->
      <path d="M78,72 C62,62 50,52 45,40 C40,26 56,18 68,28 C78,36 86,52 88,64 Z"
            fill="#b78452"/>
    </g>

    <!-- Ghutra (headscarf) -->
    <g transform="translate(635,295)">
      <path d="M35,55 C55,20 90,6 130,10 C170,14 198,38 206,70 C214,102 204,130 182,152
               C160,174 110,195 80,182 C52,170 32,140 30,110 C28,90 26,78 35,55 Z"
            fill="#f7f7f7"/>
      <path d="M60,55 C78,34 106,26 135,30" fill="none" stroke="#e5e5e5" stroke-width="6" opacity="0.9" stroke-linecap="round"/>
      <path d="M48,105 C70,92 96,92 118,102" fill="none" stroke="#e5e5e5" stroke-width="6" opacity="0.9" stroke-linecap="round"/>

      <!-- Agal -->
      <ellipse cx="120" cy="58" rx="66" ry="22" fill="#121212"/>
      <ellipse cx="120" cy="56" rx="58" ry="18" fill="#1c1c1c"/>

      <!-- Small green badge -->
      <rect x="172" y="118" width="26" height="18" rx="6" fill="#0f8a3a" opacity="0.95"/>
      <path d="M176,127 H194" stroke="#d8ffe6" stroke-width="2" opacity="0.9" stroke-linecap="round"/>
    </g>

    <!-- Legs -->
    <g fill="#c28f57">
      <rect x="235" y="500" width="42" height="150" rx="20"/>
      <rect x="320" y="510" width="42" height="140" rx="20"/>
      <rect x="420" y="510" width="42" height="140" rx="20"/>
      <rect x="510" y="500" width="42" height="150" rx="20"/>
    </g>
    <g fill="#9a6a3e" opacity="0.9">
      <rect x="228" y="640" width="58" height="20" rx="10"/>
      <rect x="313" y="640" width="58" height="20" rx="10"/>
      <rect x="413" y="640" width="58" height="20" rx="10"/>
      <rect x="503" y="640" width="58" height="20" rx="10"/>
    </g>

    <!-- Tail -->
    <path d="M165,420 C120,445 105,490 132,520" fill="none" stroke="#b78452" stroke-width="14" stroke-linecap="round"/>
    <path d="M130,520 C116,542 108,548 92,555" fill="none" stroke="#8a5a34" stroke-width="10" stroke-linecap="round"/>

    <!-- Arm reaching to bench -->
    <g>
      <path d="M520,440 C585,440 635,420 690,400" fill="none" stroke="#b78452" stroke-width="22" stroke-linecap="round"/>
      <path d="M690,400 C712,392 734,396 748,410" fill="none" stroke="#b78452" stroke-width="18" stroke-linecap="round"/>
      <circle cx="750" cy="412" r="14" fill="#b78452"/>
      <path d="M754,414 C772,420 788,434 792,450" fill="none" stroke="#9a6a3e" stroke-width="8" stroke-linecap="round"/>
    </g>

    <!-- Tool (soldering iron) -->
    <g transform="translate(760,430)">
      <path d="M0,30 L70,6" stroke="#2a2f39" stroke-width="10" stroke-linecap="round"/>
      <path d="M62,8 L95,0" stroke="#6b3f22" stroke-width="8" stroke-linecap="round"/>
      <path d="M94,0 L110,10" stroke="#cfd7e6" stroke-width="6" stroke-linecap="round"/>
      <path d="M108,10 C122,20 132,26 146,30" stroke="#71f3ff" stroke-width="4" stroke-linecap="round" opacity="0.9" filter="url(#glow)"/>
      <circle cx="10" cy="26" r="7" fill="#6cff8a" opacity="0.9"/>
    </g>

    <!-- Friendly face detail -->
    <path d="M758,505 C782,520 812,520 836,505" fill="none" stroke="#9a6a3e" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- Small caption -->
  <g opacity="0.9">
    <rect x="50" y="38" width="390" height="54" rx="16" fill="#ffffff" opacity="0.65"/>
    <text x="70" y="72" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial" font-size="20" fill="#1b2230">
      Saudi camel engineering an AGI system
    </text>
  </g>
</svg>